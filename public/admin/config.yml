backend:
  name: git-gateway
  branch: main

media_folder: "public/uploads"
public_folder: "/uploads"

collections:
  - name: "hero"
    label: "Hero"
    files:
      - name: "hero"
        label: "Hero"
        file: "src/content/hero.json"
        format: "json"
        fields:
          - { label: "Eyebrow", name: "eyebrow", widget: "string" }
          - { label: "Headline", name: "headline", widget: "string" }
