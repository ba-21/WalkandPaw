backend:
  name: git-gateway
  branch: main

media_folder: "public/assets/images"
public_folder: "/assets/images"

collections:
  - name: "content"
    label: "Site Content"
    files:
      - name: "hero"
        label: "Hero"
        file: "src/content/hero.json"
        format: "json"
        fields:
          - { label: "Comment", name: "_comment", widget: "hidden", default: "Hero header copy and contact links." }
          - { label: "Logo Alt", name: "logoAlt", widget: "string" }
          - { label: "Eyebrow", name: "eyebrow", widget: "string" }
          - { label: "Headline", name: "headline", widget: "string" }
          - { label: "Brand Name", name: "brandName", widget: "string" }
          - label: "Phone"
            name: "phone"
            widget: "object"
            fields:
              - { label: "Comment", name: "_comment", widget: "hidden", default: "Display value is shown, tel is used in the href." }
              - { label: "Display", name: "display", widget: "string" }
              - { label: "Tel", name: "tel", widget: "string" }
              - { label: "Aria Label", name: "ariaLabel", widget: "string" }
          - { label: "CTA", name: "cta", widget: "string" }
          - label: "Location"
            name: "location"
            widget: "object"
            fields:
              - { label: "Comment", name: "_comment", widget: "hidden", default: "Icon labels and social link for the location row." }
              - { label: "Name", name: "name", widget: "string" }
              - { label: "Email Aria Label", name: "emailAriaLabel", widget: "string" }
              - { label: "Instagram Aria Label", name: "instagramAriaLabel", widget: "string" }
              - { label: "Instagram URL", name: "instagramUrl", widget: "string" }

      - name: "welcome"
        label: "Welcome"
        file: "src/content/welcome.json"
        format: "json"
        fields:
          - { label: "Comment", name: "_comment", widget: "hidden", default: "Welcome section title and body copy." }
          - { label: "Title", name: "title", widget: "string" }
          - label: "Paragraphs"
            name: "paragraphs"
            widget: "list"
            field: { label: "Paragraph", name: "paragraph", widget: "text" }

      - name: "why-dogwalking"
        label: "Why Dogwalking"
        file: "src/content/why-dogwalking.json"
        format: "json"
        fields:
          - { label: "Comment", name: "_comment", widget: "hidden", default: "Why dogwalking section title and body copy." }
          - { label: "Title", name: "title", widget: "string" }
          - label: "Paragraphs"
            name: "paragraphs"
            widget: "list"
            field: { label: "Paragraph", name: "paragraph", widget: "text" }

      - name: "individual-care"
        label: "Individual Care"
        file: "src/content/individual-care.json"
        format: "json"
        fields:
          - { label: "Comment", name: "_comment", widget: "hidden", default: "Individual care section title and body copy." }
          - { label: "Title", name: "title", widget: "string" }
          - label: "Paragraphs"
            name: "paragraphs"
            widget: "list"
            field: { label: "Paragraph", name: "paragraph", widget: "text" }

      - name: "packages"
        label: "Packages"
        file: "src/content/packages.json"
        format: "json"
        fields:
          - { label: "Comment", name: "_comment", widget: "hidden", default: "Package cards and pricing notes." }
          - { label: "Title", name: "title", widget: "string" }
          - label: "Packages"
            name: "packages"
            widget: "list"
            fields:
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Subtitle", name: "subtitle", widget: "string" }
              - { label: "Price", name: "price", widget: "string" }
          - label: "Notes"
            name: "notes"
            widget: "list"
            field: { label: "Note", name: "note", widget: "string" }

      - name: "gallery"
        label: "Gallery"
        file: "src/content/gallery.json"
        format: "json"
        fields:
          - { label: "Comment", name: "_comment", widget: "hidden", default: "Gallery images, optional labels, and layout classes." }
          - label: "Images"
            name: "images"
            widget: "list"
            fields:
              - { label: "Source", name: "src", widget: "image" }
              - { label: "Alt Text", name: "alt", widget: "string" }
              - { label: "Class Name", name: "className", widget: "string", required: false }
              - { label: "Label", name: "label", widget: "string", required: false }

      - name: "about"
        label: "About"
        file: "src/content/about.json"
        format: "json"
        fields:
          - { label: "Comment", name: "_comment", widget: "hidden", default: "About section copy and image assets." }
          - { label: "Title", name: "title", widget: "string" }
          - { label: "Subtitle", name: "subtitle", widget: "string" }
          - label: "Map"
            name: "map"
            widget: "object"
            fields:
              - { label: "Comment", name: "_comment", widget: "hidden", default: "Map image shown in the about tile." }
              - { label: "Image", name: "image", widget: "image" }
              - { label: "Alt Text", name: "alt", widget: "string" }
              - { label: "Button Label", name: "buttonLabel", widget: "string" }
          - label: "Portrait"
            name: "portrait"
            widget: "object"
            fields:
              - { label: "Comment", name: "_comment", widget: "hidden", default: "Portrait image shown in the about tile." }
              - { label: "Image", name: "image", widget: "image" }
              - { label: "Alt Text", name: "alt", widget: "string" }

      - name: "reviews"
        label: "Reviews"
        file: "src/content/reviews.json"
        format: "json"
        fields:
          - { label: "Comment", name: "_comment", widget: "hidden", default: "Customer reviews and rating label." }
          - { label: "Title", name: "title", widget: "string" }
          - { label: "Rating Label", name: "ratingLabel", widget: "string" }
          - label: "Items"
            name: "items"
            widget: "list"
            fields:
              - { label: "Text", name: "text", widget: "text" }
              - { label: "Author", name: "author", widget: "string" }

      - name: "contact-modal"
        label: "Contact Modal"
        file: "src/content/contact-modal.json"
        format: "json"
        fields:
          - { label: "Comment", name: "_comment", widget: "hidden", default: "Contact modal strings and form configuration." }
          - { label: "Title", name: "title", widget: "string" }
          - { label: "Close Label", name: "closeLabel", widget: "string" }
          - label: "Form"
            name: "form"
            widget: "object"
            fields:
              - { label: "Comment", name: "_comment", widget: "hidden", default: "Form submit target and field metadata." }
              - { label: "Action", name: "action", widget: "string" }
              - { label: "Subject", name: "subject", widget: "string" }
              - { label: "Honey Field", name: "honeyField", widget: "string" }
              - label: "Fields"
                name: "fields"
                widget: "list"
                fields:
                  - { label: "Label", name: "label", widget: "string" }
                  - { label: "Name", name: "name", widget: "string" }
                  - { label: "Type", name: "type", widget: "string" }
                  - { label: "Placeholder", name: "placeholder", widget: "string" }
                  - { label: "Required", name: "required", widget: "boolean", default: true }
                  - { label: "Rows", name: "rows", widget: "number", value_type: "int", required: false }
              - label: "Buttons"
                name: "buttons"
                widget: "object"
                fields:
                  - { label: "Cancel", name: "cancel", widget: "string" }
                  - { label: "Submit", name: "submit", widget: "string" }

      - name: "map-modal"
        label: "Map Modal"
        file: "src/content/map-modal.json"
        format: "json"
        fields:
          - { label: "Comment", name: "_comment", widget: "hidden", default: "Map modal title and image metadata." }
          - { label: "Title", name: "title", widget: "string" }
          - { label: "Close Label", name: "closeLabel", widget: "string" }
          - label: "Image"
            name: "image"
            widget: "object"
            fields:
              - { label: "Source", name: "src", widget: "image" }
              - { label: "Alt Text", name: "alt", widget: "string" }

      - name: "footer"
        label: "Footer"
        file: "src/content/footer.json"
        format: "json"
        fields:
          - { label: "Comment", name: "_comment", widget: "hidden", default: "Footer links, tooltips, and labels." }
          - label: "Phone"
            name: "phone"
            widget: "object"
            fields:
              - { label: "Tel", name: "tel", widget: "string" }
              - { label: "Aria Label", name: "ariaLabel", widget: "string" }
              - { label: "Tooltip", name: "tooltip", widget: "string" }
          - label: "Email"
            name: "email"
            widget: "object"
            fields:
              - { label: "Aria Label", name: "ariaLabel", widget: "string" }
              - { label: "Tooltip", name: "tooltip", widget: "string" }
          - label: "Instagram"
            name: "instagram"
            widget: "object"
            fields:
              - { label: "URL", name: "url", widget: "string" }
              - { label: "Aria Label", name: "ariaLabel", widget: "string" }
              - { label: "Tooltip", name: "tooltip", widget: "string" }
          - label: "Legal"
            name: "legal"
            widget: "object"
            fields:
              - { label: "Comment", name: "_comment", widget: "hidden", default: "Footer legal links." }
              - { label: "Impressum Label", name: "impressumLabel", widget: "string" }
              - { label: "AGB Label", name: "agbLabel", widget: "string" }
          - { label: "Copyright", name: "copyright", widget: "string" }

      - name: "legal-impressum"
        label: "Legal Impressum"
        file: "src/content/legal-impressum.json"
        format: "json"
        fields:
          - { label: "Comment", name: "_comment", widget: "hidden", default: "Impressum content split into sections and paragraphs." }
          - { label: "Title", name: "title", widget: "string" }
          - { label: "Close Label", name: "closeLabel", widget: "string" }
          - label: "Sections"
            name: "sections"
            widget: "list"
            fields:
              - { label: "Title", name: "title", widget: "string" }
              - label: "Paragraphs"
                name: "paragraphs"
                widget: "list"
                fields:
                  - { label: "Text", name: "text", widget: "text" }
                  - label: "Link"
                    name: "link"
                    widget: "object"
                    required: false
                    fields:
                      - { label: "Href", name: "href", widget: "string" }
                      - { label: "Text", name: "text", widget: "string" }
                  - { label: "Suffix", name: "suffix", widget: "text", required: false }

      - name: "legal-agb"
        label: "Legal AGB"
        file: "src/content/legal-agb.json"
        format: "json"
        fields:
          - { label: "Comment", name: "_comment", widget: "hidden", default: "AGB content split into sections and paragraphs." }
          - { label: "Title", name: "title", widget: "string" }
          - { label: "Close Label", name: "closeLabel", widget: "string" }
          - label: "Sections"
            name: "sections"
            widget: "list"
            fields:
              - { label: "Title", name: "title", widget: "string" }
              - label: "Paragraphs"
                name: "paragraphs"
                widget: "list"
                fields:
                  - { label: "Text", name: "text", widget: "text" }
                  - label: "Link"
                    name: "link"
                    widget: "object"
                    required: false
                    fields:
                      - { label: "Href", name: "href", widget: "string" }
                      - { label: "Text", name: "text", widget: "string" }
                  - { label: "Suffix", name: "suffix", widget: "text", required: false }
